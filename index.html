<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Sea Battles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="icon" type="image/png" href="./assets/icons/icon.png">
  </head>
  <body>
    <div class="sea-icon">
      <i class="fa-solid fa-ship fa-5x"></i>
    </div>
    <div class="grid-container">
      <div class="header">
        <div class="top-left"></div>

        <div class="letters">
          <div>A</div>
          <div>B</div>
          <div>C</div>
          <div>D</div>
          <div>E</div>
          <div>F</div>
          <div>G</div>
          <div>H</div>
          <div>I</div>
          <div>J</div>
        </div>
      </div>

      <div class="game">
        <div class="numbers">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
          <div>6</div>
          <div>7</div>
          <div>8</div>
          <div>9</div>
          <div>10</div>
        </div>

        <div class="board">
          <div class="ship purple s1"></div>
          <div class="ship green s2"></div>
          <div class="ship blue s3"></div>
          <div class="ship blue s4"></div>
          <div class="ship green s5"></div>
          <div class="ship purple s6"></div>
          <div class="ship green s7"></div>
          <div class="ship purple s8"></div>
          <div class="ship purple s9"></div>
          <div class="ship red s10"></div>
        </div>
      </div>
    </div>
  </body>
</html>
